<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>助詞トレーニング</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F5F2;--white:#FFF;--ink:#1C1C1E;--ink2:#3A3A3C;
  --muted:#8E8E93;--line:#D1CEC9;
  --accent:#1A56A0;--accent-lt:#EBF2FC;
  --green:#1C7C2E;--green-lt:#E8F5EB;
  --red:#B91C1C;--red-lt:#FEF2F2;
  --shadow:0 2px 16px rgba(0,0,0,.07);--r:16px;
}
body{
  min-height:100vh;background:var(--bg);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;
  color:var(--ink);display:flex;flex-direction:column;align-items:center;
  padding:0 1rem 4rem;
}
.screen{width:100%;max-width:500px;display:none;flex-direction:column;align-items:center;}
.screen.active{display:flex;}

/* ── START ── */
#start-screen{padding-top:2.5rem;gap:0;}
.start-title{font-size:1.9rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.15rem;}
.start-sub{font-size:.72rem;color:var(--muted);letter-spacing:.1em;margin-bottom:2rem;}
.sec-label{width:100%;font-size:.68rem;font-weight:700;letter-spacing:.12em;color:var(--muted);margin-bottom:.5rem;text-transform:uppercase;}
.mode-grid{width:100%;display:flex;flex-direction:column;gap:8px;margin-bottom:2rem;}
.mode-btn{
  width:100%;background:var(--white);border:1.5px solid var(--line);border-radius:14px;
  padding:14px 18px;font-family:inherit;font-size:14px;font-weight:500;
  color:var(--ink2);cursor:pointer;text-align:left;
  display:flex;align-items:center;justify-content:space-between;
  transition:border-color .15s,background .15s;
}
.mode-btn:hover{border-color:var(--accent);background:var(--accent-lt);}
.mode-btn.selected{border-color:var(--accent);background:var(--accent-lt);color:var(--accent);font-weight:700;}
.mode-btn .badge{
  font-size:.65rem;font-weight:600;letter-spacing:.06em;padding:3px 8px;
  border-radius:99px;background:var(--line);color:var(--ink2);white-space:nowrap;
}
.mode-btn.selected .badge{background:var(--accent);color:var(--white);}
.start-btn{
  width:100%;padding:17px;background:var(--accent);color:var(--white);
  border:none;border-radius:14px;font-family:inherit;font-size:16px;
  font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;
}
.start-btn:hover{opacity:.88;}
.start-btn:active{transform:scale(.98);}

/* ── TOPBAR ── */
.topbar{width:100%;display:flex;align-items:center;gap:10px;margin-bottom:1.3rem;padding-top:1.4rem;}
.t-count{font-size:12px;color:var(--muted);white-space:nowrap;min-width:36px;}
.t-prog{flex:1;height:4px;background:var(--line);border-radius:2px;overflow:hidden;}
.t-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);width:0%;}
.t-score{font-size:12px;color:var(--muted);white-space:nowrap;min-width:28px;text-align:right;}

/* ── Q CARD ── */
#q-card{
  width:100%;background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);
  padding:1.75rem 1.5rem;margin-bottom:1.1rem;min-height:100px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;
}
#sentence-display{font-size:1.3rem;font-weight:600;line-height:2.2;text-align:center;letter-spacing:.04em;}
.bl{
  display:inline-flex;align-items:flex-end;justify-content:center;
  min-width:2rem;height:1.5rem;border-bottom:3px solid var(--line);
  margin:0 1px;vertical-align:middle;color:transparent;position:relative;transition:border-color .2s;
}
.bl .num{position:absolute;top:-1.1rem;left:50%;transform:translateX(-50%);font-size:.58rem;color:var(--muted);font-weight:600;}
.bl.active{border-color:var(--accent);animation:pulse .9s ease-in-out infinite alternate;}
.bl.filled{border-color:var(--accent);color:var(--accent);min-width:auto;padding:0 4px;font-weight:700;font-size:.95rem;}
@keyframes pulse{from{border-color:var(--accent);}to{border-color:#7CB3E8;}}
#cur-label{font-size:.72rem;color:var(--muted);min-height:1rem;}

/* ── CHOICES ── */
#choices{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.75rem;}
.c-btn{
  background:var(--white);border:1.5px solid var(--line);border-radius:14px;
  padding:20px 10px;font-family:inherit;font-size:1.3rem;font-weight:600;
  color:var(--ink);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.05);
  transition:border-color .12s,background .12s,transform .1s;
}
.c-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-lt);transform:translateY(-1px);}
.c-btn:active:not(:disabled){transform:scale(.97);}
.c-btn.correct{background:var(--green-lt);border-color:var(--green);color:var(--green);}
.c-btn.wrong{background:var(--red-lt);border-color:var(--red);color:var(--red);}
.c-btn:disabled{cursor:default;}

/* ── FEEDBACK ── */
#fb-card{
  width:100%;border-radius:var(--r);box-shadow:var(--shadow);
  padding:1.75rem 1.5rem;margin-bottom:1.25rem;
  display:flex;flex-direction:column;align-items:center;gap:.85rem;
}
#fb-card.ok{background:var(--green-lt);border:1.5px solid var(--green);}
#fb-card.ng{background:var(--red-lt);border:1.5px solid var(--red);}
#fb-icon{font-size:2.2rem;line-height:1;}
#fb-label{font-size:.95rem;font-weight:700;}
#fb-card.ok #fb-label{color:var(--green);}
#fb-card.ng #fb-label{color:var(--red);}
#fb-sentence{font-size:1.2rem;font-weight:600;text-align:center;line-height:2.2;letter-spacing:.04em;}
.pa{color:var(--accent);font-weight:700;border-bottom:2px solid var(--accent);}
#fb-explain{font-size:.82rem;color:var(--ink2);text-align:center;line-height:1.75;}
#next-btn{
  width:100%;padding:17px;background:var(--accent);color:var(--white);
  border:none;border-radius:14px;font-family:inherit;font-size:16px;
  font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;
}
#next-btn:hover{opacity:.88;}
#next-btn:active{transform:scale(.98);}

/* ── RESULT ── */
#result-screen{padding-top:3rem;gap:.6rem;}
#r-card{
  width:100%;background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);
  padding:2.5rem 2rem;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:.35rem;margin-bottom:.75rem;
}
#r-icon{font-size:3.75rem;margin-bottom:.25rem;}
#r-score{font-size:3.5rem;font-weight:700;color:var(--accent);line-height:1;}
#r-of{font-size:.82rem;color:var(--muted);margin-bottom:.3rem;}
#r-msg{font-size:.92rem;color:var(--ink2);}
.r-btn{width:100%;max-width:500px;padding:15px;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.r-btn.solid{background:var(--accent);color:var(--white);}
.r-btn.outline{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
.r-btn:hover{opacity:.85;}
</style>
</head>
<body>

<div class="screen active" id="start-screen">
  <div class="start-title">助詞トレーニング</div>
  <div class="start-sub">PARTICLE TRAINING</div>
  <div class="sec-label">モードを選ぶ</div>
  <div class="mode-grid">
    <button class="mode-btn selected" data-mode="n2">
      <span>ふつう語順　２文節</span>
      <span class="badge">やさしい</span>
    </button>
    <button class="mode-btn" data-mode="n3">
      <span>ふつう語順　３文節</span>
      <span class="badge">ふつう</span>
    </button>
    <button class="mode-btn" data-mode="n4">
      <span>ふつう語順　４文節</span>
      <span class="badge">難しい</span>
    </button>
    <button class="mode-btn" data-mode="s3">
      <span>かき混ぜ語順　３文節</span>
      <span class="badge">ふつう＋</span>
    </button>

  </div>
  <button class="start-btn" onclick="startQuiz()">はじめる</button>
</div>

<div class="screen" id="quiz-screen">
  <div class="topbar">
    <span class="t-count" id="q-count">1 / 10</span>
    <div class="t-prog"><div class="t-fill" id="prog-fill"></div></div>
    <span class="t-score" id="score-disp">0</span>
  </div>
  <div id="q-card">
    <div id="sentence-display"></div>
    <div id="cur-label"></div>
  </div>
  <div id="choices"></div>
</div>

<div class="screen" id="fb-screen">
  <div class="topbar">
    <span class="t-count" id="fb-count">1 / 10</span>
    <div class="t-prog"><div class="t-fill" id="fb-prog-fill"></div></div>
    <span class="t-score" id="fb-score">0</span>
  </div>
  <div id="fb-card">
    <div id="fb-icon">○</div>
    <div id="fb-label">正解</div>
    <div id="fb-sentence"></div>
    <div id="fb-explain"></div>
  </div>
  <button id="next-btn" onclick="nextQ()">次へ →</button>
</div>

<div class="screen" id="result-screen">
  <div id="r-card">
    <div id="r-icon">🏅</div>
    <div id="r-score">0</div>
    <div id="r-of">/ 10</div>
    <div id="r-msg"></div>
  </div>
  <button class="r-btn solid" style="margin-bottom:.6rem;" onclick="retryQuiz()">もう一度</button>
  <button class="r-btn outline" onclick="goStart()">モードを変える</button>
</div>

<script>
// ============================================================
// データ形式
//
// 1空欄（2文節）:
//   { text:'犬___吠えた。', answer:'が', choices:[4択], explain:'解説' }

// 複数空欄（3・4文節、かき混ぜ）:
//   { text:'母___市場___野菜___買った。',
//     blanks:[{answer, choices, explain}, ...] }
//
// ※ text中の___ の数 = blanks配列の長さ と必ず一致
// ============================================================

// ── N2: ふつう語順 2文節 ──────────────────────────────
const QB_N2 = [
  // ── が ──
  {text:'犬___吠えた。',answer:'が',choices:['が','を','に','で'],explain:'動作の主体には「が」をつけます。'},
  {text:'赤ちゃん___泣いた。',answer:'が',choices:['が','を','に','で'],explain:'動作の主体には「が」をつけます。'},
  {text:'電話___鳴った。',answer:'が',choices:['が','を','に','で'],explain:'変化・発生の主体には「が」をつけます。'},
  {text:'空___暗くなった。',answer:'が',choices:['が','を','に','で'],explain:'変化の主体には「が」をつけます。'},
  {text:'財布___見つかった。',answer:'が',choices:['が','を','に','で'],explain:'発見・発生の主体には「が」をつけます。'},
  {text:'桜___咲いた。',answer:'が',choices:['が','を','に','で'],explain:'変化の主体には「が」をつけます。'},
  {text:'子ども___転んだ。',answer:'が',choices:['が','は','を','に'],explain:'動作の主体には「が」をつけます。'},
  {text:'窓___割れた。',answer:'が',choices:['が','を','に','で'],explain:'変化の主体には「が」をつけます。'},
  // ── を ──
  {text:'新聞___読んだ。',answer:'を',choices:['を','が','に','で'],explain:'「読む」の対象には「を」をつけます。'},
  {text:'コーヒー___飲んだ。',answer:'を',choices:['を','が','に','で'],explain:'「飲む」の対象には「を」をつけます。'},
  {text:'パン___焼いた。',answer:'を',choices:['を','が','に','で'],explain:'「焼く」の対象には「を」をつけます。'},
  {text:'服___洗った。',answer:'を',choices:['を','が','に','で'],explain:'「洗う」の対象には「を」をつけます。'},
  {text:'写真___撮った。',answer:'を',choices:['を','が','に','で'],explain:'「撮る」の対象には「を」をつけます。'},
  {text:'ドア___閉めた。',answer:'を',choices:['を','が','に','で'],explain:'「閉める」の対象には「を」をつけます。'},
  {text:'川___泳いだ。',answer:'を',choices:['を','で','に','が'],explain:'広い空間を移動するときは「を」をつけます。'},
  {text:'階段___上った。',answer:'を',choices:['を','で','に','が'],explain:'移動の経路には「を」をつけます。'},
  {text:'橋___渡った。',answer:'を',choices:['を','で','に','が'],explain:'通過する経路には「を」をつけます。'},

  {text:'椅子___腰かけた。',answer:'に',choices:['に','で','を','が'],explain:'「腰かける」の着地点には「に」をつけます。'},

  {text:'上司___怒られた。',answer:'に',choices:['に','と','で','を'],explain:'働きかけを受ける相手には「に」をつけます。'},
  {text:'母___電話した。',answer:'に',choices:['に','と','で','を'],explain:'「電話する」の相手には「に」をつけます。'},
  {text:'棚___本をしまった。',answer:'に',choices:['に','で','を','が'],explain:'しまう先の場所には「に」をつけます。'},
  {text:'姉___似ている。',answer:'に',choices:['に','と','で','が'],explain:'「似る」の対象には「に」をつけます。'},
  {text:'東京___出張した。',answer:'に',choices:['に','で','を','が'],explain:'移動の目的地には「に」をつけます。'},
  // ── で ──
  {text:'ハサミ___紙を切った。',answer:'で',choices:['で','に','を','が'],explain:'道具には「で」をつけます。'},
  {text:'自転車___来た。',answer:'で',choices:['で','に','を','が'],explain:'交通手段には「で」をつけます。'},
  {text:'英語___話した。',answer:'で',choices:['で','に','を','が'],explain:'言語（手段）には「で」をつけます。'},
  {text:'熱___学校を休んだ。',answer:'で',choices:['で','が','に','を'],explain:'理由・原因には「で」をつけます。'},

  {text:'父___車だ。',answer:'の',choices:['の','が','に','で'],explain:'所有を表すには「の」をつけます。'},

const QB_N3 = [
  {text:'兄___自転車___駅___向かった。',
   blanks:[
     {answer:'は',choices:['は','が','を','の'],explain:'「兄は」—話題には「は」をつけます。'},

  {text:'私___スーパー___魚___買った。',
   blanks:[
     {answer:'は',choices:['は','が','を','の'],explain:'「私は」—話題には「は」をつけます。'},
     {answer:'で',choices:['で','に','を','が'],explain:'「スーパーで」—場所には「で」をつけます。'},
     {answer:'を',choices:['を','が','に','の'],explain:'「魚を」—対象には「を」をつけます。'},
  ]},
  {text:'子ども___廊下___友達___ぶつかった。',
   blanks:[
     {answer:'が',choices:['が','は','を','の'],explain:'「子どもが」—主体には「が」をつけます。'},
     {answer:'で',choices:['で','に','を','が'],explain:'「廊下で」—場所には「で」をつけます。'},

   blanks:[

     {answer:'で',choices:['で','に','を','が'],explain:'「電車で」—交通手段には「で」をつけます。'},

     {answer:'で',choices:['で','に','を','が'],explain:'「畑で」—場所には「で」をつけます。'},
     {answer:'を',choices:['を','が','に','の'],explain:'「野菜を」—対象には「を」をつけます。'},

   blanks:[

     {answer:'を',choices:['を','が','に','の'],explain:'「野菜を」—対象には「を」をつけます。'},
  ]},
  {text:'私___友達___バス停___待った。',
   blanks:[
     {answer:'は',choices:['は','が','を','の'],explain:'「私は」—話題には「は」をつけます。'},
     {answer:'を',choices:['を','が','に','の'],explain:'「友達を」—待つ対象には「を」をつけます。'},
     {answer:'で',choices:['で','に','を','が'],explain:'「バス停で」—場所には「で」をつけます。'},
  ]},
  {text:'彼女___自分の部屋___ギター___弾いた。',
   blanks:[
     {answer:'は',choices:['は','が','を','の'],explain:'「彼女は」—話題には「は」をつけます。'},
     {answer:'で',choices:['で','に','を','が'],explain:'「部屋で」—場所には「で」をつけます。'},
     {answer:'を',choices:['を','が','に','の'],explain:'「ギターを」—対象には「を」をつけます。'},
  ]},
  {text:'医者___患者___薬___渡した。',
   blanks:[
     {answer:'が',choices:['が','は','を','の'],explain:'「医者が」—主体には「が」をつけます。'},
     {answer:'に',choices:['に','と','で','を'],explain:'「患者に」—渡す相手には「に」をつけます。'},
     {answer:'を',choices:['を','が','に','の'],explain:'「薬を」—対象には「を」をつけます。'},
  ]},
  {text:'先輩___後輩___仕事___教えた。',
   blanks:[
     {answer:'が',choices:['が','は','を','の'],explain:'「先輩が」—主体には「が」をつけます。'},
     {answer:'に',choices:['に','と','で','を'],explain:'「後輩に」—教える相手には「に」をつけます。'},
     {answer:'を',choices:['を','が','に','の'],explain:'「仕事を」—対象には「を」をつけます。'},
  ]},

// ============================================================
// STATE
// ============================================================
const BANKS = {n2:QB_N2, n3:QB_N3, n4:QB_N4, s3:QB_S3};
let cfg={mode:'n2'};
let sessionQ=[], curIdx=0, score=0;
let curBlankIdx=0, blankAnswered=[], qCorrectCount=0;

// ============================================================
// START
// ============================================================
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    cfg.mode=btn.dataset.mode;
  });
});

function startQuiz(){
  const pool=shuffleArr([...BANKS[cfg.mode]]);
  sessionQ=pool.slice(0,10);
  curIdx=0; score=0;
  show('quiz-screen'); renderQ();
}

// ============================================================
// RENDER
// ============================================================
function renderQ(){
  document.getElementById('q-count').textContent=(curIdx+1)+' / 10';
  document.getElementById('prog-fill').style.width=(curIdx/10*100)+'%';
  document.getElementById('score-disp').textContent=score;

  const q=sessionQ[curIdx];
  if(!q.blanks){
    // 1空欄
    document.getElementById('sentence-display').innerHTML=buildHTML(q.text,[],0);
    document.getElementById('cur-label').textContent='';
    buildChoices(shuffleArr([...q.choices]),(chosen,btn)=>pickSingle(chosen,btn,q));
  } else {
    // 複数空欄
    curBlankIdx=0; qCorrectCount=0;
    blankAnswered=q.blanks.map(()=>null);
    drawMulti(q);
    buildChoices(shuffleArr([...q.blanks[0].choices]),(chosen,btn)=>pickMulti(chosen,btn,q));
  }
}

// ─── 単一空欄 ───
function pickSingle(chosen,btn,q){
  document.querySelectorAll('.c-btn').forEach(b=>b.disabled=true);
  const ok=chosen===q.answer;
  if(ok){btn.classList.add('correct');score++;}
  else{
    btn.classList.add('wrong');
    document.querySelectorAll('.c-btn').forEach(b=>{if(b.dataset.p===q.answer)b.classList.add('correct');});
  }
  const fullHTML=buildHTML(q.text,[q.answer],0,true);
  setTimeout(()=>showFB(ok,q.explain,fullHTML,null),380);
}

// ─── 複数空欄 ───
function drawMulti(q){
  const filled=q.blanks.map((b,i)=>blankAnswered[i]!==null?b.answer:null);
  document.getElementById('sentence-display').innerHTML=buildHTML(q.text,filled,curBlankIdx);
  document.getElementById('cur-label').textContent=
    numLabel(curBlankIdx+1)+'番目（全'+q.blanks.length+'か所）';
}

function pickMulti(chosen,btn,q){
  document.querySelectorAll('.c-btn').forEach(b=>b.disabled=true);
  const blank=q.blanks[curBlankIdx];
  const ok=chosen===blank.answer;
  if(ok){btn.classList.add('correct');qCorrectCount++;}
  else{
    btn.classList.add('wrong');
    document.querySelectorAll('.c-btn').forEach(b=>{if(b.dataset.p===blank.answer)b.classList.add('correct');});
  }
  blankAnswered[curBlankIdx]=ok;

  // 正答を埋めて再描画
  const filled=q.blanks.map((b,i)=>blankAnswered[i]!==null?b.answer:null);
  document.getElementById('sentence-display').innerHTML=buildHTML(q.text,filled,curBlankIdx,true);

  const isLast=(curBlankIdx===q.blanks.length-1);
  if(isLast && qCorrectCount===q.blanks.length) score++;
  // FBには回答済みの空欄の正答のみ表示（未回答はまだ空欄のまま）
  const fbFilled=q.blanks.map((b,i)=>blankAnswered[i]!==null?b.answer:null);
  const fullHTML=buildHTML(q.text,fbFilled,-1,true);

  setTimeout(()=>showFB(
    ok, blank.explain, fullHTML,
    isLast ? null : ()=>{
      curBlankIdx++;
      drawMulti(q);
      buildChoices(
        shuffleArr([...q.blanks[curBlankIdx].choices]),
        (c,b)=>pickMulti(c,b,q)
      );
      show('quiz-screen');
    }
  ),380);
}

// ============================================================
// HTML生成
// text中の___ を空欄スパンに置換
// filled: [null or 正答文字列] — null=未回答、文字列=表示
// curBlank: アクティブな空欄index（-1=なし）
// forFB: フィードバック画面用（全部filledとして表示）
// ============================================================
function buildHTML(text, filled, curBlank, forFB){
  let i=0;
  return text.replace(/___/g,()=>{
    const ans=filled&&filled[i]!=null?filled[i]:null;
    const isCur=(i===curBlank);
    let html;
    if(ans){
      html='<span class="bl filled">'+h(ans)+'</span>';
    } else {
      html='<span class="bl'+(isCur?' active':'')+'"><span class="num">'+numLabel(i+1)+'</span></span>';
    }
    i++;
    return html;
  });
}

// ============================================================
// FEEDBACK
// ============================================================
function showFB(ok,explain,fullHTML,continueCallback){
  document.getElementById('fb-count').textContent=(curIdx+1)+' / 10';
  document.getElementById('fb-prog-fill').style.width=((curIdx+1)/10*100)+'%';
  document.getElementById('fb-score').textContent=score;
  const card=document.getElementById('fb-card');
  card.className=ok?'ok':'ng';
  document.getElementById('fb-icon').textContent=ok?'○':'×';
  document.getElementById('fb-label').textContent=ok?'正解':'不正解';
  document.getElementById('fb-sentence').innerHTML=fullHTML;
  document.getElementById('fb-explain').textContent=explain;
  const btn=document.getElementById('next-btn');
  if(continueCallback){
    btn.textContent='次の空欄 →';
    btn.onclick=continueCallback;
  } else {
    btn.textContent='次へ →';
    btn.onclick=nextQ;
  }
  show('fb-screen');
}

function nextQ(){
  curIdx++;
  if(curIdx>=10) showResult();
  else{show('quiz-screen');renderQ();}
}

// ============================================================
// RESULT
// ============================================================
function showResult(){
  const icons=['😢','😢','😕','😐','🙂','🙂','😊','😄','👍','🌟','🏆'];
  const msgs=['もう一度がんばろう！','続けて練習しよう！','もう少しだ！','なかなか良い！','よくできました！','すばらしい！','ほぼ完璧！','完璧です！'];
  const s=Math.min(score,10);
  document.getElementById('r-icon').textContent=icons[s];
  document.getElementById('r-score').textContent=s;
  document.getElementById('r-of').textContent='/ 10';
  document.getElementById('r-msg').textContent=msgs[Math.min(s,msgs.length-1)];
  show('result-screen');
}
function retryQuiz(){startQuiz();}
function goStart(){show('start-screen');}

// ============================================================
// UTILS
// ============================================================
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function buildChoices(ch,onPick){
  const el=document.getElementById('choices');el.innerHTML='';
  ch.forEach(p=>{
    const btn=document.createElement('button');
    btn.className='c-btn';btn.textContent=p;btn.dataset.p=p;
    btn.onclick=()=>onPick(p,btn);
    el.appendChild(btn);
  });
}
function shuffleArr(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function numLabel(n){return['①','②','③','④','⑤'][n-1]||String(n);}
</script>
